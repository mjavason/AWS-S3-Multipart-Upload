<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>S3 Multipart Test</title>
  <style>
    #progressContainer {
      width: 300px;
      height: 20px;
      border: 1px solid #000;
      margin-top: 10px;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: green;
      transition: width 0.2s ease;
    }
  </style>
</head>

<body>
  <input type="file" id="fileInput" />
  <button id="uploadBtn">Upload</button>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <pre id="log"></pre>

  <script type="module">
    const API_BASE = "http://localhost:5000";

    const logEl = document.getElementById("log");
    const progressBar = document.getElementById("progressBar");

    const log = (msg) => {
      logEl.textContent += msg + "\n";
    };

    const setProgress = (percent) => {
      progressBar.style.width = percent + "%";
    };

    document.getElementById("uploadBtn").onclick = async () => {
      const input = document.getElementById("fileInput");
      const file = input.files[0];
      if (!file) return;

      log("init multipart");

      const initRes = await fetch(API_BASE + "/multipart/init", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          fileName: file.name,
          contentType: file.type
        })
      });

      const { uploadId, key } = await initRes.json();

      const PART_SIZE = 5 * 1024 * 1024;
      const totalParts = Math.ceil(file.size / PART_SIZE);

      log(`parts: ${totalParts}`);

      const signRes = await fetch(API_BASE + "/multipart/sign", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          key,
          uploadId,
          parts: totalParts
        })
      });

      const { urls } = await signRes.json();

      const uploadedParts = [];
      let completedParts = 0;

      await Promise.all(
        urls.map(async ({ partNumber, url }) => {
          const start = (partNumber - 1) * PART_SIZE;
          const end = Math.min(start + PART_SIZE, file.size);
          const blob = file.slice(start, end);

          const res = await fetch(url, {
            method: "PUT",
            body: blob
          });

          if (!res.ok) {
            throw new Error(`Part ${partNumber} failed`);
          }

          const etag = res.headers.get("ETag");

          uploadedParts.push({
            ETag: etag,
            PartNumber: partNumber
          });

          completedParts++;

          const percent = Math.round((completedParts / totalParts) * 100);
          setProgress(percent);

          log(`uploaded part ${partNumber} (${percent}%)`);
        })
      );

      log("completing upload");

      const completeRes = await fetch(API_BASE + "/multipart/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          key,
          uploadId,
          parts: uploadedParts
        })
      });

      const result = await completeRes.json();

      setProgress(100);

      log("done:");
      log(JSON.stringify(result, null, 2));
    };
  </script>
</body>
</html>
