<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>S3 Multipart Test</title>
</head>

<body>
    <input type="file" id="fileInput" />
    <button id="uploadBtn">Upload</button>
    <pre id="log"></pre>

    <script type="module">
        const API_BASE = "http://localhost:5000"; // your express API

        const logEl = document.getElementById("log");
        const log = (msg) => {
            logEl.textContent += msg + "\n";
        };

        document.getElementById("uploadBtn").onclick = async () => {
            const input = document.getElementById("fileInput");
            const file = input.files[0];
            if (!file) return;

            log("init multipart");

            // 1. INIT
            const initRes = await fetch(API_BASE + "/multipart/init", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    fileName: file.name,
                    contentType: file.type
                })
            });

            const { uploadId, key } = await initRes.json();

            const PART_SIZE = 5 * 1024 * 1024;
            const totalParts = Math.ceil(file.size / PART_SIZE);

            log(`parts: ${totalParts}`);

            // 2. SIGN URLS
            const signRes = await fetch(API_BASE + "/multipart/sign", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    key,
                    uploadId,
                    parts: totalParts
                })
            });

            const { urls } = await signRes.json();

            // 3. UPLOAD PARTS (parallel)
            const uploadedParts = [];

            await Promise.all(
                urls.map(async ({ partNumber, url }) => {
                    const start = (partNumber - 1) * PART_SIZE;
                    const end = Math.min(start + PART_SIZE, file.size);
                    const blob = file.slice(start, end);

                    const res = await fetch(url, {
                        method: "PUT",
                        body: blob
                    });

                    if (!res.ok) {
                        throw new Error(`Part ${partNumber} failed`);
                    }

                    const etag = res.headers.get("ETag");

                    uploadedParts.push({
                        ETag: etag,
                        PartNumber: partNumber
                    });

                    log(`uploaded part ${partNumber}`);
                })
            );

            // 4. COMPLETE
            log("completing upload");

            const completeRes = await fetch(API_BASE + "/multipart/complete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    key,
                    uploadId,
                    parts: uploadedParts
                })
            });

            const result = await completeRes.json();

            log("done:");
            log(JSON.stringify(result, null, 2));
        };
    </script>
</body>

</html>
